<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>自己紹介</title>
    <style>

        body {

            line-height: 1.7;
            color: #333;

            padding: 40px 0 20px;
            text-align: center;
            border-bottom: 2px solid #007bff;
        }

            background: #fff;
            padding: 30px;

        }
        h2 { color: #007bff; font-size: 1.4rem; margin-bottom: 15px; border-left: 4px solid #007bff; padding-left: 10px; }

        li { margin-bottom: 15px; }
        .work-title { font-weight: bold; font-size: 1.1rem; color: #222; margin-bottom: 5px; }
        .work-desc { color: #666; font-size: 0.95rem; margin-top: 5px; }

    <header>

                    <div class="work-desc">タイトル、自分の関心分野・学んでいること、授業で作った成果物への説明といった構成で作成した。</div>
                </li>
            </ul>

    <footer>
        <p>&copy; 2026 Portfolio.</p>
    </footer>

</body>
